<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0c969"/>
      <stop offset="0.5" stop-color="#ca8a04"/>
      <stop offset="1" stop-color="#92610a"/>
    </linearGradient>
    <style>
      .brand-name { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 600; fill: #14100a; font-size:48px; letter-spacing:1px }
      .brand-tag { font-family: 'Montserrat', Arial, sans-serif; font-weight:500; fill: #6b6560; font-size:14px; letter-spacing:2px }
    </style>
  </defs>
  <!-- White background -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Rounded dark square with gold ring (symbol) -->
  <g transform="translate(32,20)">
    <rect width="160" height="160" rx="34" fill="#0c0a09" />
    <rect x="6" y="6" width="148" height="148" rx="30" fill="none" stroke="url(#g)" stroke-width="4" />
    <!-- Scaled monogram N -->
    <path d="M38 120 V28 h12.5 l43 55.5 V28 H120 V120 h-12.5 L50 63.5 V120 Z" fill="url(#g)"/>
  </g>

  <!-- Brand text to the right of symbol -->
  <g transform="translate(212,86)">
    <text x="0" y="0" class="brand-name">NDIOBEEN</text>
    <text x="0" y="38" class="brand-tag">GUI LOGISTIQUE</text>
  </g>

  <!-- Optional alignment guide (hidden - for editing) -->
  <g opacity="0" id="guides"><rect x="0" y="0" width="640" height="200" fill="none" stroke="#eee"/></g>
</svg>